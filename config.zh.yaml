doc_type: manual_bundle

build:
  languages: [zh]
  default_model: JE-2000E
  default_region: CN
  targets:
    - model: JE-2000E
      region: CN
  main_tex: manual_demo.tex
  output_pdf: manual_{model_slug}_{region_slug}.pdf
  xelatex_runs: 3
  open_pdf: false
  build_word: true
  word_output: manual_{model_slug}_{region_slug}.docx
  word_source: bundle
  word_reference_doc: docs/templates/word_template/template.docx
  word_title: "|PRODUCT_NAME| 用户指南"
  open_word: false
  build_html: false
  open_html: false

paths:
  docs_dir: docs
  layout_params_csv: data/layout_params.csv
  spec_master_csv: data/phase1/Spec_Master.csv
  spec_footnotes_csv: data/phase1/Spec_Footnotes.csv
  spec_titles_csv: data/phase1/spec_titles.csv
  page_manifest: docs/manifests/manual_zh.yaml

tools:
  patch_fonts: tools/patch_latex_fonts.py
