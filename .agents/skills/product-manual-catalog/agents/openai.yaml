interface:
  display_name: "Product Manual Catalog"
  short_description: "Look up shipped product manuals and catalog overview from the Feishu 发布文档管理 Base"
  default_prompt: "When the user asks for a product's manual, its link/version/region/document type, or a catalog overview, query the 发布文档管理 catalog with .agents/skills/product-manual-catalog/scripts/query_product_manuals.py and answer with the matched manual links (Markdown links, latest version first) or the overview summary. Search by ONE 型号 or 项目 code only (e.g. HTE139, JE-2000F; 项目 codes are searchable); never put a region/文档类型/版本 inside the search string — use --region/--doc-type filters or filter the returned rows. A 'code + 区域' ask like 'HTE139 欧规' means search HTE139 then keep the 欧规 rows, not search the literal 'HTE139 欧规'. If a code search returns 0, retry the bare code before saying 查不到."
