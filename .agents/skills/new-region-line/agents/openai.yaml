interface:
  display_name: "New Region / Compliance Manual Line"
  short_description: "Stand up a brand-new (Model, Region, Language) manual line end-to-end"
  default_prompt: "When asked to onboard a NEW region / compliance manual line that does not exist yet (e.g. 新建韩规/欧规安规产线, a new market or output language), follow the end-to-end playbook: collect the operator inputs (spec-sheet PDF, product display name, warranty/legal, source+output languages, compliance & translation decisions); add the repo config + manifest + cloned page templates (keep the full paths block); register the output language in code (signal_words, sync_data_models, localized_copy, manual_copy_source, page_registry) if new; enter the Feishu source-table data (document_key + region dict entries, spec params via the 入库表 + 字段映射规则表 with operator confirmation, page placeholders, localized content columns + market/region tags, TM); sync; and validate with build.py check plus a regression check and unittest before opening a PR. See references/setup-map.md for exact files, table IDs, and lark-cli recipes."
