name: Feishu Common Setup
description: Set up the shared Python, Node, pandoc, and lark-cli environment for Feishu workflows.
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: "requirements.txt"

    - name: Install pandoc
      uses: pandoc/actions/setup@v1
      with:
        version: "3.9.0.2"

    - name: Print pandoc version
      shell: bash
      run: pandoc --version | head -n 1

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Cache npm downloads
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-feishu-common-npm-${{ hashFiles('.github/actions/feishu-common-setup/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-feishu-common-npm-

    - name: Install lark-cli
      shell: bash
      run: npm install --global --prefer-online --no-audit @larksuite/cli@1.0.49

    - name: Print lark-cli version
      shell: bash
      run: lark-cli --version

    - name: Configure lark-cli app credentials
      shell: bash
      run: |
        printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret-stdin --brand feishu
