name: Queue Sentinel Issue
description: >-
  Milestone K5: open/update a tracking Issue when a queue job fails, and close
  it when a run with the SAME TITLE succeeds again — include the record_id in
  the title so the open/close lifecycle is per-record. Same sentinel pattern as
  cred-health-check / feishu-schema-parity / backport-reminder. A cancelled job
  opens nothing (an operator stopping a run is not an incident).

inputs:
  job-status:
    description: "Pass the calling job's status: ${{ job.status }}"
    required: true
  label:
    description: Sentinel label identifying this workflow's issues
    required: true
  title:
    description: Issue title; include the record_id (or 'batch') for per-record lifecycle
    required: true
  details:
    description: Extra context lines (record_id, trigger source, dispatch nonce)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Open or update tracking issue on failure
      if: ${{ inputs.job-status == 'failure' }}
      uses: actions/github-script@v7
      env:
        SENTINEL_LABEL: ${{ inputs.label }}
        SENTINEL_TITLE: ${{ inputs.title }}
        SENTINEL_DETAILS: ${{ inputs.details }}
      with:
        script: |
          const label = process.env.SENTINEL_LABEL;
          const title = process.env.SENTINEL_TITLE;
          const details = (process.env.SENTINEL_DETAILS || '').trim();
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            `Latest failure: ${runUrl}`,
            '',
            details,
            '',
            'Check the queue row against the run log. If the failure happened at',
            'writeback, the build may have SUCCEEDED while the Bitable row silently',
            'kept a stale state — that silent divergence is exactly what this',
            'sentinel exists to surface.',
            '',
            'This issue closes automatically when the next run with the same title succeeds.',
          ].join('\n');
          const search = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: label,
            per_page: 50,
          });
          const existing = search.data.find(issue => issue.title === title);
          if (existing) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Still failing as of ${new Date().toISOString()}. ${runUrl}`,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
            });
          }

    - name: Close tracking issue on recovery
      if: ${{ inputs.job-status == 'success' }}
      uses: actions/github-script@v7
      env:
        SENTINEL_LABEL: ${{ inputs.label }}
        SENTINEL_TITLE: ${{ inputs.title }}
      with:
        script: |
          const label = process.env.SENTINEL_LABEL;
          const title = process.env.SENTINEL_TITLE;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const search = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: label,
            per_page: 50,
          });
          const existing = search.data.find(issue => issue.title === title);
          if (existing) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Recovered: ${runUrl}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
          }
