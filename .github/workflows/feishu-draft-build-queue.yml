name: Feishu Draft Build Queue

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Optional source label for this queue run
        required: false
        type: string
      queue_record_id:
        description: Optional Document_link record_id that triggered this run
        required: false
        type: string

concurrency:
  group: feishu-draft-build-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process-draft-queue:
    runs-on: ubuntu-latest
    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_PHASE2_IDENTITY: bot
      FEISHU_PHASE2_BASE_TOKEN: ${{ secrets.FEISHU_PHASE2_BASE_TOKEN }}
      FEISHU_PHASE2_SPEC_MASTER_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_MASTER_TABLE_ID }}
      FEISHU_PHASE2_SPEC_MASTER_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_MASTER_VIEW_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_NOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_NOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_TITLES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_TITLES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_TITLES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_TITLES_VIEW_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 2

      - name: Validate required secrets
        shell: bash
        run: |
          bash scripts/validate_required_env.sh feishu-draft-build-queue

      - name: Print trigger context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "trigger_source=${{ inputs.trigger_source || '' }}"
          echo "queue_record_id=${{ inputs.queue_record_id || '' }}"

      - name: Validate dispatch ref
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Dispatch feishu-draft-build-queue.yml on ${{ github.event.repository.default_branch }}. The actual Build Draft Package source is resolved from Document_link.Git_ref."
            exit 1
          fi

      - uses: ./.github/actions/feishu-common-setup

      - name: Process Feishu draft queue
        shell: bash
        run: |
          cmd=(python build.py process-build-queue --config config.us.yaml --data-root data/phase2 --workflow-action build-draft-package)
          if [ -n "${{ inputs.queue_record_id || '' }}" ]; then
            cmd+=(--record-id "${{ inputs.queue_record_id }}")
          fi
          "${cmd[@]}"

      - name: Upload built docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feishu-draft-build-queue-output
          path: |
            docs/_build
            docs/_review
            data/phase2/snapshot_manifest.json
            data/phase2/row_key_mapping.csv
          if-no-files-found: ignore
