name: Manual Validation

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: manual-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Run minimal static checks
        run: python -m ruff check build.py integrations tools tests scripts

  # Milestone K6 (severable slice): fail the PR when a credential-shaped
  # string lands in the tree. Allowlist policy lives in .gitleaks.toml
  # (Feishu RESOURCE tokens are committed by design; credentials never).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download gitleaks (pinned + checksum-verified)
        run: |
          curl -sSfL -o /tmp/gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
      - name: Scan working tree for credential shapes
        run: /tmp/gitleaks detect --source . --no-git --redact --no-banner --config .gitleaks.toml

  maintainability-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check maintainability guardrails
        run: python tools/check_maintainability_guardrails.py

  doc-link-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check code-as-doc and user-guide link integrity
        run: python tools/check_doc_link_integrity.py

  asset-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Check asset registry export hashes
        run: python build.py asset-check --config configs/config.us.yaml --model JE-1000F --region US

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: python -m pip install mypy
      - name: Run mypy on tools/utils
        run: python -m mypy tools/utils

  openclaw-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install OpenClaw plugin dependencies
        working-directory: integrations/openclaw/auto-manual-control-layer
        run: npm ci
      - name: Run OpenClaw plugin tests
        working-directory: integrations/openclaw/auto-manual-control-layer
        run: npm test

  feishu-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The adapter has no npm dependencies (Node built-ins only) and no
      # lockfile, so there is nothing to `npm ci`; run the test script directly.
      - name: Run Feishu IM webhook adapter tests
        working-directory: integrations/openclaw/feishu-im-webhook-adapter
        run: npm test

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run unit tests
        run: python -m unittest

  queue-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run queue contract tests
        run: python -m unittest tests.test_queue_transitions tests.test_process_build_queue_writeback
      - name: Run schema drift fixture check
        run: |
          python tools/schema_drift.py --payload tests/fixtures/schema_drift/passing_payload.json
          python tools/schema_drift.py --phase2-root tests/fixtures/phase2 --queue-fields tests/fixtures/schema_drift/queue_fields_complete.json

  doctor-en:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache TeX Live apt packages
        uses: actions/cache@v4
        with:
          # Caches the downloaded .deb archives so the TeX Live install does not
          # re-download the whole XeTeX stack every run. Bump the trailing -v1 to
          # force a rebuild if the package set changes.
          path: ~/apt-cache
          key: apt-cache-doctor-en-${{ runner.os }}-texlive-xetex-v1
      - name: Install system dependencies
        run: |
          PANDOC_VERSION=3.9.0.2
          mkdir -p ~/apt-cache/partial
          sudo apt-get update
          sudo apt-get install -y \
            -o Dir::Cache::archives="$HOME/apt-cache" \
            -o APT::Keep-Downloaded-Packages=true \
            curl texlive-xetex
          curl -L "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -n 1
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run doctor (EN/US)
        run: python build.py doctor --config configs/config.us-en.yaml --model JE-1000F --region US --data-root tests/fixtures/phase2

  check-en:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run check (EN/US)
        run: python build.py check --config configs/config.us-en.yaml --model JE-1000F --region US --data-root tests/fixtures/phase2

  check-jp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run check (JP)
        run: python build.py check --config configs/config.ja.yaml --model JE-1000F --region JP --data-root tests/fixtures/phase2

  workflow-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Run diff-report smoke
        run: python build.py diff-report --config configs/config.us.yaml --model JE-1000F --region US --data-root tests/fixtures/phase2 --from-ref HEAD~1 --to-ref HEAD
      - name: Run release-manifest smoke
        run: python build.py release-manifest --config configs/config.ja.yaml --model JE-1000F --region JP --data-root tests/fixtures/phase2
