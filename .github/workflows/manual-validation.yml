name: Manual Validation

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: manual-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Run minimal static checks
        run: python -m ruff check build.py integrations tools tests scripts

  maintainability-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check maintainability guardrails
        run: python tools/check_maintainability_guardrails.py

  openclaw-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install OpenClaw plugin dependencies
        working-directory: integrations/openclaw/auto-manual-control-layer
        run: npm ci
      - name: Run OpenClaw plugin tests
        working-directory: integrations/openclaw/auto-manual-control-layer
        run: npm test

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest

  queue-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run queue contract tests
        run: python -m unittest tests.test_queue_transitions tests.test_process_build_queue_writeback
      - name: Run schema drift fixture check
        run: |
          python tools/schema_drift.py --payload tests/fixtures/schema_drift/passing_payload.json
          python tools/schema_drift.py --phase2-root data/phase2 --queue-fields tests/fixtures/schema_drift/queue_fields_complete.json

  doctor-en:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          PANDOC_VERSION=3.9.0.2
          sudo apt-get update
          sudo apt-get install -y curl texlive-xetex
          curl -L "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -n 1
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run doctor (EN/US)
        run: python build.py doctor --config config.us-en.yaml --model JE-1000F --region US

  check-en:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run check (EN/US)
        run: python build.py check --config config.us-en.yaml --model JE-1000F --region US

  check-jp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run check (JP)
        run: python build.py check --config config.ja.yaml --model JE-1000F --region JP

  workflow-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run diff-report smoke
        run: python build.py diff-report --config config.us.yaml --model JE-1000F --region US --from-ref HEAD~1 --to-ref HEAD
      - name: Run release-manifest smoke
        run: python build.py release-manifest --config config.ja.yaml --model JE-1000F --region JP
