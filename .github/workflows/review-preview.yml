name: Review Preview Package
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Review Preview Package - PR #{0} - {1}', github.event.pull_request.number, github.event.pull_request.head.ref)
      || format('Review Preview Package - {0}', github.ref_name) }}

on:
  pull_request:
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "data/phase1/**"
      - "build.py"
      - "tools/**"
      - "config.yaml"
      - "config.us-en.yaml"
      - "config.us-es.yaml"
      - "config.us-fr.yaml"
      - "config.ja.yaml"
      - "config.eu.yaml"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
  workflow_dispatch:

concurrency:
  group: review-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  package-review-preview:
    runs-on: ubuntu-latest
    env:
      FROM_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
      TO_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_PREVIEW_FIXED_ALIAS: ${{ vars.VERCEL_PREVIEW_FIXED_ALIAS }}
      VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE: ${{ vars.VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build review preview package (workspace)
        run: >
          python tools/process_docs/build_review_preview.py
          --config config.yaml
          --model JE-1000F
          --region US
          --source review
          --from-ref "$FROM_REF"
          --to-ref "$TO_REF"
      - name: Upload review preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-preview-workspace
          path: site/review-preview/dist
      - name: Install Vercel CLI
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: npm install --global vercel@latest
      - name: Pull Vercel preview settings
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build Vercel prebuilt output
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy preview to Vercel
        id: deploy
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          preview_url="$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
      - name: Assign stable Vercel aliases
        id: alias
        if: ${{ steps.deploy.outputs.preview_url != '' }}
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail

          normalize_host() {
            local value="$1"
            value="${value#https://}"
            value="${value#http://}"
            value="${value%%/}"
            printf '%s' "$value"
          }

          slugify_branch() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"
            value="$(printf '%s' "$value" | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
            value="${value:0:48}"
            value="${value%-}"
            printf '%s' "$value"
          }

          validate_labels() {
            local host="$1"
            IFS='.' read -r -a labels <<< "$host"
            for label in "${labels[@]}"; do
              if [[ -z "$label" ]]; then
                echo "::error::Alias host contains an empty label: $host"
                exit 1
              fi
              if (( ${#label} > 63 )); then
                echo "::error::Alias label is longer than 63 characters: $label"
                exit 1
              fi
            done
          }

          preview_host="$(normalize_host "$PREVIEW_URL")"
          branch_slug="$(slugify_branch "$BRANCH_NAME")"
          if [[ -z "$branch_slug" ]]; then
            echo "::error::Branch alias slug resolved to an empty value for branch '$BRANCH_NAME'."
            exit 1
          fi

          branch_alias=""
          fixed_alias=""

          if [[ -n "${VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE:-}" ]]; then
            if [[ "${VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE}" != *"{branch}"* ]]; then
              echo "::error::VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE must include the {branch} placeholder."
              exit 1
            fi
            branch_alias="${VERCEL_PREVIEW_BRANCH_ALIAS_TEMPLATE//\{branch\}/${branch_slug}}"
            branch_alias="$(normalize_host "$branch_alias")"
            validate_labels "$branch_alias"
            vercel alias set "$preview_host" "$branch_alias" --token="${{ secrets.VERCEL_TOKEN }}"
            echo "branch_alias=${branch_alias}" >> "$GITHUB_OUTPUT"
            echo "branch_alias_url=https://${branch_alias}" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${VERCEL_PREVIEW_FIXED_ALIAS:-}" ]]; then
            fixed_alias="$(normalize_host "$VERCEL_PREVIEW_FIXED_ALIAS")"
            validate_labels "$fixed_alias"
            if [[ "$fixed_alias" != "$branch_alias" ]]; then
              vercel alias set "$preview_host" "$fixed_alias" --token="${{ secrets.VERCEL_TOKEN }}"
            fi
            echo "fixed_alias=${fixed_alias}" >> "$GITHUB_OUTPUT"
            echo "fixed_alias_url=https://${fixed_alias}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish Vercel workspace summary
        if: ${{ steps.deploy.outputs.preview_url != '' }}
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_ALIAS_URL: ${{ steps.alias.outputs.branch_alias_url }}
          FIXED_ALIAS_URL: ${{ steps.alias.outputs.fixed_alias_url }}
        run: |
          echo "Vercel deployment snapshot: ${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${BRANCH_ALIAS_URL}" ]]; then
            echo "Stable branch alias: ${BRANCH_ALIAS_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -n "${FIXED_ALIAS_URL}" ]]; then
            echo "Stable shared alias: ${FIXED_ALIAS_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment workspace URL on PR
        if: ${{ github.event_name == 'pull_request' && steps.deploy.outputs.preview_url != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_ALIAS_URL: ${{ steps.alias.outputs.branch_alias_url }}
          FIXED_ALIAS_URL: ${{ steps.alias.outputs.fixed_alias_url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- review-preview-comment -->';
            const previewUrl = process.env.PREVIEW_URL;
            const branchAliasUrl = process.env.BRANCH_ALIAS_URL || '';
            const fixedAliasUrl = process.env.FIXED_ALIAS_URL || '';
            const stableWorkspaceUrl = branchAliasUrl || fixedAliasUrl || previewUrl;
            const workspacePath = path.join(process.env.GITHUB_WORKSPACE, 'site', 'review-preview', 'dist', 'generated', 'workspace.json');
            const workspace = JSON.parse(fs.readFileSync(workspacePath, 'utf8'));
            const defaultManualUrl = workspace?.defaults?.manual_url || 'manual/index.html';
            const defaultChangeUrl = workspace?.defaults?.change_url || 'changes/index.html';
            const manualUrl = new URL(defaultManualUrl, `${stableWorkspaceUrl}/`).toString();
            const changeUrl = new URL(defaultChangeUrl, `${stableWorkspaceUrl}/`).toString();
            const lines = [
              marker,
              'Review workspace is ready for this PR.',
              '',
              `- Workspace: ${stableWorkspaceUrl}`,
              `- Deployment Snapshot: ${previewUrl}`,
            ];

            if (branchAliasUrl) {
              lines.push(`- Stable Branch Alias: ${branchAliasUrl}`);
            }
            if (fixedAliasUrl) {
              lines.push(`- Stable Shared Alias: ${fixedAliasUrl}`);
            }

            lines.push(`- Default Review HTML: ${manualUrl}`);
            lines.push(`- Default Change Report: ${changeUrl}`);

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
