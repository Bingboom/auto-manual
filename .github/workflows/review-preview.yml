name: Review Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "data/phase1/**"
      - "build.py"
      - "tools/**"
      - "config.yaml"
      - "config.ja.yaml"
      - "config.eu.yaml"
      - "vercel.json"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
  push:
    branches:
      - "main"
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "data/phase1/**"
      - "build.py"
      - "tools/**"
      - "config.yaml"
      - "config.ja.yaml"
      - "config.eu.yaml"
      - "vercel.json"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: review-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-review-preview:
    runs-on: ubuntu-latest
    env:
      FROM_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || 'HEAD~1' }}
      TO_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Normalize diff refs
        id: refs
        shell: bash
        run: |
          FROM_VALUE="$FROM_REF"
          if [[ -z "$FROM_VALUE" || "$FROM_VALUE" =~ ^0+$ ]]; then
            FROM_VALUE="HEAD~1"
          fi
          echo "from_ref=$FROM_VALUE" >> "$GITHUB_OUTPUT"
          echo "to_ref=$TO_REF" >> "$GITHUB_OUTPUT"

      - name: Build review preview package (US)
        run: >
          python tools/process_docs/build_review_preview.py
          --config config.yaml
          --model JE-1000F
          --region US
          --source review
          --from-ref "${{ steps.refs.outputs.from_ref }}"
          --to-ref "${{ steps.refs.outputs.to_ref }}"

      - name: Upload review preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-preview-us
          path: site/review-preview/dist

  deploy-review-preview:
    needs: build-review-preview
    runs-on: ubuntu-latest
    if: >
      secrets.VERCEL_TOKEN != '' &&
      secrets.VERCEL_ORG_ID != '' &&
      secrets.VERCEL_PROJECT_ID != '' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download packaged review preview
        uses: actions/download-artifact@v4
        with:
          name: review-preview-us
          path: site/review-preview/dist

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve Vercel environment
        id: environment
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "vercel_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_environment=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project settings
        run: >
          vercel pull
          --yes
          --environment="${{ steps.environment.outputs.vercel_environment }}"
          --token="$VERCEL_TOKEN"

      - name: Prepare static output for Vercel
        run: >
          python tools/process_docs/package_vercel_static_output.py
          --dist-dir site/review-preview/dist
          --output-root .vercel/output

      - name: Deploy static preview to Vercel
        id: deploy
        shell: bash
        run: |
          if [[ "${{ steps.environment.outputs.vercel_environment }}" == "production" ]]; then
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Review preview deployed"
            echo
            echo "- Summary: ${{ steps.deploy.outputs.deployment_url }}"
            echo "- Review HTML: ${{ steps.deploy.outputs.deployment_url }}/manual/index.html"
            echo "- Change report: ${{ steps.deploy.outputs.deployment_url }}/changes/index.html"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview links on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const marker = '<!-- review-preview-links -->';
            const body = `${marker}
            Review preview is ready for design sharing.

            - Summary: ${process.env.DEPLOYMENT_URL}
            - Review HTML: ${process.env.DEPLOYMENT_URL}/manual/index.html
            - Change report: ${process.env.DEPLOYMENT_URL}/changes/index.html`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
