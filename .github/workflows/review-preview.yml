name: Review Preview Package
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Review Preview Package - PR #{0} - {1}', github.event.pull_request.number, github.event.pull_request.head.ref)
      || format('Review Preview Package - {0}', github.ref_name) }}

on:
  pull_request:
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "docs/manifests/**"
      - "data/phase1/**"
      - "build.py"
      - "tools/**"
      - "config.us.yaml"
      - "config.us-en.yaml"
      - "config.us-es.yaml"
      - "config.us-fr.yaml"
      - "config.ja.yaml"
      - "config.zh.yaml"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
  workflow_dispatch:

concurrency:
  group: review-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  package-review-preview:
    runs-on: ubuntu-latest
    env:
      FROM_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
      TO_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Select preview target
        id: preview-target
        shell: bash
        run: |
          config="config.us-en.yaml"
          model="JE-1000F"
          region="US"
          source="review"

          changed_files="$(git diff --name-only "$FROM_REF" "$TO_REF")"
          if printf '%s\n' "$changed_files" | grep -Eq '^(config\.zh\.yaml|docs/manifests/manual_zh\.yaml|docs/templates/page_zh/|docs/templates/recipes/zh/)'; then
            config="config.zh.yaml"
            model="JE-2000E"
            region="CN"
            source="runtime"
          fi

          echo "config=$config" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"
      - name: Build review preview package (workspace)
        run: >
          python tools/process_docs/build_review_preview.py
          --config "${{ steps.preview-target.outputs.config }}"
          --model "${{ steps.preview-target.outputs.model }}"
          --region "${{ steps.preview-target.outputs.region }}"
          --source "${{ steps.preview-target.outputs.source }}"
          --from-ref "$FROM_REF"
          --to-ref "$TO_REF"
          --all-review-models
      - name: Upload review preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-preview-workspace
          path: site/review-preview/dist

