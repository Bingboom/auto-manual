name: Review Preview Package
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Review Preview Package - PR #{0} - {1}', github.event.pull_request.number, github.event.pull_request.head.ref)
      || format('Review Preview Package - {0}', github.ref_name) }}

on:
  pull_request:
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "docs/manifests/**"
      - "data/phase2/**"
      - "tests/fixtures/phase2/**"
      - "build.py"
      - "tools/**"
      - "configs/config.us.yaml"
      - "configs/config.us-en.yaml"
      - "configs/config.us-es.yaml"
      - "configs/config.us-fr.yaml"
      - "configs/config.ja.yaml"
      - "configs/config.zh.yaml"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
      - ".github/workflows/review-preview.yml"
  workflow_dispatch:

concurrency:
  group: review-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  package-review-preview:
    runs-on: ubuntu-latest
    env:
      FROM_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
      TO_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || github.ref }}
          fetch-depth: 0
      - name: Validate dispatch ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Dispatch review-preview.yml on ${{ github.event.repository.default_branch }} so manual runs always use the latest workflow definition."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Select preview target
        id: preview-target
        shell: bash
        run: |
          config="configs/config.us-en.yaml"
          model="JE-1000F"
          region="US"
          source="review"

          changed_files="$(git diff --name-only "$FROM_REF" "$TO_REF")"
          if printf '%s\n' "$changed_files" | grep -Eq '^(config\.zh\.yaml|docs/manifests/manual_zh\.yaml|docs/templates/page_zh/|docs/templates/recipes/zh/)'; then
            config="configs/config.zh.yaml"
            model="JE-2000E"
            region="CN"
            source="runtime"
          fi

          echo "config=$config" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"
      - name: Build review preview smoke package
        run: >
          python tools/process_docs/build_review_preview.py
          --config "${{ steps.preview-target.outputs.config }}"
          --model "${{ steps.preview-target.outputs.model }}"
          --region "${{ steps.preview-target.outputs.region }}"
          --source "${{ steps.preview-target.outputs.source }}"
          --from-ref "$FROM_REF"
          --to-ref "$TO_REF"
          --data-root tests/fixtures/phase2
          --all-review-models
          --skip-word
      - name: Verify review preview smoke artifacts
        shell: bash
        run: |
          test -f site/review-preview/dist/index.html
          test -f site/review-preview/dist/manual/index.html
          test -f site/review-preview/dist/changes/index.html
          test -f site/review-preview/dist/generated/meta.json
          test -f site/review-preview/dist/generated/changes.json
          test -f site/review-preview/dist/generated/workspace.json
      - name: Upload review preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-preview-workspace
          path: site/review-preview/dist
