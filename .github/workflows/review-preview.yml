name: Review Preview Package
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Review Preview Package - PR #{0} - {1}', github.event.pull_request.number, github.event.pull_request.head.ref)
      || format('Review Preview Package - {0}', github.ref_name) }}

on:
  pull_request:
    paths:
      - "docs/_review/**"
      - "docs/templates/**"
      - "data/phase1/**"
      - "build.py"
      - "tools/**"
      - "config.yaml"
      - "config.us-en.yaml"
      - "config.us-es.yaml"
      - "config.us-fr.yaml"
      - "config.ja.yaml"
      - "config.eu.yaml"
      - "README.md"
      - "code-as-doc/**"
      - "user-guide/**"
      - "site/review-preview/**"
  workflow_dispatch:

concurrency:
  group: review-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  package-review-preview:
    runs-on: ubuntu-latest
    env:
      FROM_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
      TO_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build review preview package (workspace)
        run: >
          python tools/process_docs/build_review_preview.py
          --config config.us-en.yaml
          --model JE-1000F
          --region US
          --source review
          --from-ref "$FROM_REF"
          --to-ref "$TO_REF"
      - name: Upload review preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-preview-workspace
          path: site/review-preview/dist
      - name: Install Vercel CLI
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: npm install --global vercel@latest
      - name: Pull Vercel preview settings
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build Vercel prebuilt output
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy preview to Vercel
        id: deploy
        if: ${{ env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          preview_url="$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
      - name: Publish Vercel workspace summary
        if: ${{ steps.deploy.outputs.preview_url != '' }}
        run: |
          echo "Vercel workspace: ${{ steps.deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Comment workspace URL on PR
        if: ${{ github.event_name == 'pull_request' && steps.deploy.outputs.preview_url != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- review-preview-comment -->';
            const previewUrl = process.env.PREVIEW_URL;
            const workspacePath = path.join(process.env.GITHUB_WORKSPACE, 'site', 'review-preview', 'dist', 'generated', 'workspace.json');
            const workspace = JSON.parse(fs.readFileSync(workspacePath, 'utf8'));
            const defaultManualUrl = workspace?.defaults?.manual_url || 'manual/index.html';
            const defaultChangeUrl = workspace?.defaults?.change_url || 'changes/index.html';
            const manualUrl = new URL(defaultManualUrl, `${previewUrl}/`).toString();
            const changeUrl = new URL(defaultChangeUrl, `${previewUrl}/`).toString();
            const body = `${marker}
            Review workspace is ready for this PR.

            - Workspace: ${previewUrl}
            - Default Review HTML: ${manualUrl}
            - Default Change Report: ${changeUrl}
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
