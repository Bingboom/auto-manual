name: Feishu Build Queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Optional source label for this queue run
        required: false
        type: string
      queue_record_id:
        description: Optional Document_link record_id that triggered this run
        required: false
        type: string

concurrency:
  group: feishu-build-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process-queue:
    runs-on: ubuntu-latest
    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_PHASE2_IDENTITY: bot
      FEISHU_PHASE2_BASE_TOKEN: ${{ secrets.FEISHU_PHASE2_BASE_TOKEN }}
      FEISHU_PHASE2_SPEC_MASTER_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_MASTER_TABLE_ID }}
      FEISHU_PHASE2_SPEC_MASTER_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_MASTER_VIEW_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_NOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_NOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_TITLES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_TITLES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_TITLES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_TITLES_VIEW_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 2

      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            FEISHU_APP_ID
            FEISHU_APP_SECRET
            FEISHU_PHASE2_BASE_TOKEN
            FEISHU_PHASE2_SPEC_MASTER_TABLE_ID
            FEISHU_PHASE2_SPEC_MASTER_VIEW_ID
            FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID
            FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID
            FEISHU_PHASE2_SPEC_NOTES_TABLE_ID
            FEISHU_PHASE2_SPEC_NOTES_VIEW_ID
            FEISHU_PHASE2_SPEC_TITLES_TABLE_ID
            FEISHU_PHASE2_SPEC_TITLES_VIEW_ID
            FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID
            FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID
            FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
            FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secrets/env vars:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Print trigger context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "trigger_source=${{ inputs.trigger_source || '' }}"
          echo "queue_record_id=${{ inputs.queue_record_id || '' }}"

      - name: Validate dispatch ref
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Dispatch feishu-build-queue.yml on ${{ github.event.repository.default_branch }}. The actual Publish source is resolved from Document_link.Git_ref when present."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install lark-cli
        run: npm install --global @larksuite/cli

      - name: Configure lark-cli app credentials
        shell: bash
        run: |
          printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret-stdin --brand feishu

      - name: Process Feishu build queue
        shell: bash
        run: |
          cmd=(python build.py process-build-queue --config config.us.yaml --data-root data/phase2 --workflow-action publish)
          if [ -n "${{ inputs.queue_record_id || '' }}" ]; then
            cmd+=(--record-id "${{ inputs.queue_record_id }}")
          fi
          "${cmd[@]}"

      - name: Build latest publish HTML site
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' }}
        run: python tools/process_docs/build_publish_latest_site.py

      - name: Install Vercel CLI
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel production settings
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production output
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy latest publish HTML to Vercel
        id: deploy
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        shell: bash
        run: |
          publish_url="$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "publish_url=${publish_url}" >> "$GITHUB_OUTPUT"

      - name: Publish Vercel summary
        if: ${{ steps.deploy.outputs.publish_url != '' }}
        run: |
          echo "Latest publish HTML: ${{ steps.deploy.outputs.publish_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload built docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feishu-build-queue-output
          path: |
            docs/_build
            reports/releases
            site/publish-latest/dist
            data/phase2/snapshot_manifest.json
            data/phase2/row_key_mapping.csv
          if-no-files-found: ignore
