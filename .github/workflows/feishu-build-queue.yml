name: Feishu Build Queue
run-name: Feishu Build Queue / ${{ github.event_name == 'schedule' && 'scheduled' || (inputs.queue_record_id != '' && inputs.queue_record_id || 'batch') }} / ${{ inputs.openclaw_dispatch_nonce != '' && inputs.openclaw_dispatch_nonce || github.run_id }}

on:
  # Scheduled polling is intentionally disabled. Re-enable this block only
  # when the bot secrets and Feishu permissions are healthy enough for
  # unattended runs.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Optional source label for this queue run
        required: false
        type: string
      queue_record_id:
        description: Optional Document_link record_id that triggered this run
        required: false
        type: string
      openclaw_dispatch_nonce:
        description: Optional nonce used by OpenClaw to correlate the dispatched run
        required: false
        type: string

concurrency:
  group: feishu-build-queue
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process-queue:
    if: ${{ github.repository != 'Bingboom/Hello-Docs' || vars.FEISHU_BUILD_QUEUE_PAUSED != 'true' }}
    runs-on: ubuntu-latest
    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_PHASE2_IDENTITY: bot
      # Auto-grant the built (bot-owned) cloud doc to the operator so they edit it
      # directly instead of making a 副本; used when a build row has no operator_union_id.
      FEISHU_CLOUD_DOC_DEFAULT_EDITOR: ou_377437909529b57c474e7b9004edecb2
      FEISHU_PHASE2_BASE_TOKEN: ${{ secrets.FEISHU_PHASE2_BASE_TOKEN }}
      FEISHU_PHASE2_SPEC_ROWS_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_ROWS_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_SPEC_ROWS_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_ROWS_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_NOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_NOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_VIEW_ID }}
      FEISHU_TRANSLATION_MEMORY_BASE_TOKEN: ${{ secrets.FEISHU_TRANSLATION_MEMORY_BASE_TOKEN }}
      FEISHU_TRANSLATION_MEMORY_TABLE_ID: ${{ secrets.FEISHU_TRANSLATION_MEMORY_TABLE_ID }}
      FEISHU_TRANSLATION_MEMORY_VIEW_ID: ${{ secrets.FEISHU_TRANSLATION_MEMORY_VIEW_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID }}
      FEISHU_PHASE2_LCD_ICONS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_LCD_ICONS_TABLE_ID }}
      FEISHU_PHASE2_LCD_ICONS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_LCD_ICONS_VIEW_ID }}
      FEISHU_PHASE2_TROUBLESHOOTING_TABLE_ID: ${{ secrets.FEISHU_PHASE2_TROUBLESHOOTING_TABLE_ID }}
      FEISHU_PHASE2_TROUBLESHOOTING_VIEW_ID: ${{ secrets.FEISHU_PHASE2_TROUBLESHOOTING_VIEW_ID }}
      FEISHU_PHASE2_VARIABLE_DEFAULTS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_DEFAULTS_TABLE_ID }}
      FEISHU_PHASE2_VARIABLE_DEFAULTS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_DEFAULTS_VIEW_ID }}
      FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_TABLE_ID }}
      FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_VIEW_ID }}
      FEISHU_PHASE2_MANUAL_COPY_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_MANUAL_COPY_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_MANUAL_COPY_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_MANUAL_COPY_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN }}
      AUTO_MANUAL_ARTIFACT_SINK_PROVIDER: lark_drive
      AUTO_MANUAL_ARTIFACT_MIRROR_PROVIDER: ${{ vars.AUTO_MANUAL_ARTIFACT_MIRROR_PROVIDER }}
      DINGTALK_DOCS_TARGET_NODE_URL: ${{ secrets.DINGTALK_DOCS_TARGET_NODE_URL }}
      DINGTALK_DOCS_A_TOKEN: ${{ secrets.DINGTALK_DOCS_A_TOKEN }}
      DINGTALK_DOCS_XSRF_TOKEN: ${{ secrets.DINGTALK_DOCS_XSRF_TOKEN }}
      DINGTALK_DOCS_COOKIE: ${{ secrets.DINGTALK_DOCS_COOKIE }}
      DINGTALK_DOCS_BX_V: ${{ secrets.DINGTALK_DOCS_BX_V }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 2

      - name: Validate required secrets
        shell: bash
        run: |
          bash scripts/validate_required_env.sh feishu-build-queue

      - name: Print trigger context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "trigger_source=${{ inputs.trigger_source || '' }}"
          echo "queue_record_id=${{ inputs.queue_record_id || '' }}"
          echo "openclaw_dispatch_nonce=${{ inputs.openclaw_dispatch_nonce || '' }}"
          echo "artifact_sink_provider=${AUTO_MANUAL_ARTIFACT_SINK_PROVIDER:-lark_drive}"
          echo "artifact_mirror_provider=${AUTO_MANUAL_ARTIFACT_MIRROR_PROVIDER:-none}"

      - name: Validate dispatch ref
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Dispatch feishu-build-queue.yml on ${{ github.event.repository.default_branch }}. The actual Publish source is resolved from Document_link.Git_ref when present."
            exit 1
          fi

      - uses: ./.github/actions/feishu-common-setup

      - name: Install XeLaTeX runtime for publish PDF
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-lang-cjk \
            fonts-dejavu-core \
            fonts-freefont-otf \
            fonts-noto-cjk \
            fonts-noto-core \
            fonts-noto-extra \
            fonts-noto-mono

      - name: Process Feishu build queue
        shell: bash
        run: |
          cmd=(python build.py process-build-queue --config configs/config.us.yaml --data-root data/phase2 --workflow-action publish)
          if [ -n "${{ inputs.queue_record_id || '' }}" ]; then
            cmd+=(--record-id "${{ inputs.queue_record_id }}")
          fi
          "${cmd[@]}"

      - name: Build latest publish HTML site
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' }}
        run: python tools/process_docs/build_publish_latest_site.py

      - name: Install Vercel CLI
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel production settings
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production output
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy latest publish HTML to Vercel
        id: deploy
        if: ${{ hashFiles('reports/releases/**/latest/publish_meta.json') != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != '' }}
        shell: bash
        run: |
          publish_url="$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "publish_url=${publish_url}" >> "$GITHUB_OUTPUT"

      - name: Publish Vercel summary
        if: ${{ steps.deploy.outputs.publish_url != '' }}
        run: |
          {
            echo "Latest publish HTML deployed successfully."
            echo
            echo "- GitHub Actions summaries and logs may mask the raw Vercel URL."
            echo "- Use \`HTML_link\`, \`publish_meta.json\`, or the \`openclaw-run-metadata\` artifact for the unmasked deploy URL."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write publish HTML_link back to Document_link
        if: ${{ steps.deploy.outputs.publish_url != '' }}
        shell: bash
        run: |
          cmd=(
            python tools/write_publish_html_link.py
            --config configs/config.us.yaml
            --publish-url "${{ steps.deploy.outputs.publish_url }}"
          )
          if [ -n "${{ inputs.queue_record_id || '' }}" ]; then
            cmd+=(--record-id "${{ inputs.queue_record_id }}")
          fi
          "${cmd[@]}"

      - name: Write OpenClaw run metadata
        if: always()
        shell: bash
        run: |
          python integrations/openclaw/scripts/write_workflow_run_metadata.py \
            --output .tmp/openclaw/feishu-build-queue-run.json \
            --workflow-name "Feishu Build Queue" \
            --workflow-file ".github/workflows/feishu-build-queue.yml" \
            --queue-record-id "${{ inputs.queue_record_id || '' }}" \
            --trigger-source "${{ inputs.trigger_source || '' }}" \
            --openclaw-dispatch-nonce "${{ inputs.openclaw_dispatch_nonce || '' }}" \
            --publish-url "${{ steps.deploy.outputs.publish_url || '' }}" \
            --artifact-name feishu-build-queue-output \
            --artifact-name openclaw-run-metadata

      - name: Upload built docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feishu-build-queue-output
          path: |
            docs/_build
            reports/releases
            site/publish-latest/dist
            data/phase2/snapshot_manifest.json
            data/phase2/row_key_mapping.csv
          if-no-files-found: ignore

      - name: Upload OpenClaw run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-run-metadata
          path: .tmp/openclaw/feishu-build-queue-run.json
          if-no-files-found: error
