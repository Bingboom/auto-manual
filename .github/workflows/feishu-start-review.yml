name: Feishu Start Review
run-name: Feishu Start Review / ${{ inputs.queue_record_id != '' && inputs.queue_record_id || 'batch' }} / ${{ inputs.openclaw_dispatch_nonce != '' && inputs.openclaw_dispatch_nonce || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Optional source label for this review-start run
        required: false
        type: string
      queue_record_id:
        description: Optional review-init record_id that triggered this run
        required: false
        type: string
      openclaw_dispatch_nonce:
        description: Optional nonce used by OpenClaw to correlate the dispatched run
        required: false
        type: string

concurrency:
  group: feishu-start-review-${{ inputs.queue_record_id != '' && inputs.queue_record_id || 'batch' }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  process-review-start:
    if: ${{ github.repository != 'Bingboom/Hello-Docs' || vars.FEISHU_BUILD_QUEUE_PAUSED != 'true' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      REVIEW_START_BASE_REF: ${{ github.event.repository.default_branch }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_PHASE2_IDENTITY: bot
      FEISHU_PHASE2_BASE_TOKEN: ${{ secrets.FEISHU_PHASE2_BASE_TOKEN }}
      FEISHU_PHASE2_MODEL_CAPABILITIES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_MODEL_CAPABILITIES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_ROWS_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_ROWS_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_SPEC_ROWS_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_ROWS_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID }}
      FEISHU_PHASE2_SPEC_NOTES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_TABLE_ID }}
      FEISHU_PHASE2_SPEC_NOTES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SPEC_NOTES_VIEW_ID }}
      FEISHU_TRANSLATION_MEMORY_BASE_TOKEN: ${{ secrets.FEISHU_TRANSLATION_MEMORY_BASE_TOKEN }}
      FEISHU_TRANSLATION_MEMORY_TABLE_ID: ${{ secrets.FEISHU_TRANSLATION_MEMORY_TABLE_ID }}
      FEISHU_TRANSLATION_MEMORY_VIEW_ID: ${{ secrets.FEISHU_TRANSLATION_MEMORY_VIEW_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID }}
      FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID }}
      FEISHU_PHASE2_LCD_ICONS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_LCD_ICONS_TABLE_ID }}
      FEISHU_PHASE2_LCD_ICONS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_LCD_ICONS_VIEW_ID }}
      FEISHU_PHASE2_TROUBLESHOOTING_TABLE_ID: ${{ secrets.FEISHU_PHASE2_TROUBLESHOOTING_TABLE_ID }}
      FEISHU_PHASE2_TROUBLESHOOTING_VIEW_ID: ${{ secrets.FEISHU_PHASE2_TROUBLESHOOTING_VIEW_ID }}
      FEISHU_PHASE2_VARIABLE_DEFAULTS_TABLE_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_DEFAULTS_TABLE_ID }}
      FEISHU_PHASE2_VARIABLE_DEFAULTS_VIEW_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_DEFAULTS_VIEW_ID }}
      FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_TABLE_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_TABLE_ID }}
      FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_VIEW_ID: ${{ secrets.FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_VIEW_ID }}
      FEISHU_PHASE2_MANUAL_COPY_SOURCE_TABLE_ID: ${{ secrets.FEISHU_PHASE2_MANUAL_COPY_SOURCE_TABLE_ID }}
      FEISHU_PHASE2_MANUAL_COPY_SOURCE_VIEW_ID: ${{ secrets.FEISHU_PHASE2_MANUAL_COPY_SOURCE_VIEW_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID }}
      FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID: ${{ secrets.FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID }}
      AUTO_MANUAL_FAILURE_SUMMARY_PATH: .tmp/openclaw/feishu-start-review-failure-summary.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          bash scripts/validate_required_env.sh feishu-start-review

      - name: Print trigger context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "trigger_source=${{ inputs.trigger_source || '' }}"
          echo "queue_record_id=${{ inputs.queue_record_id || '' }}"
          echo "openclaw_dispatch_nonce=${{ inputs.openclaw_dispatch_nonce || '' }}"

      - name: Validate dispatch ref
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Dispatch feishu-start-review.yml on ${{ github.event.repository.default_branch }} so review-start always uses the latest worker definition."
            exit 1
          fi

      - uses: ./.github/actions/feishu-common-setup

      - name: Process review-start queue
        shell: bash
        run: |
          mkdir -p .tmp/openclaw
          cmd=(python build.py process-review-start-queue --config configs/config.us.yaml --data-root .tmp/review-start/phase2)
          if [ -n "${{ inputs.queue_record_id || '' }}" ]; then
            cmd+=(--record-id "${{ inputs.queue_record_id }}")
          fi
          set +e
          "${cmd[@]}" 2>&1 | tee .tmp/openclaw/review-start-output.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Auto-approve checks for trusted review PRs
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          output_path=.tmp/openclaw/review-start-output.log
          if [ ! -s "$output_path" ]; then
            echo "No review-start output was produced; there are no generated PRs to approve."
            exit 0
          fi

          mapfile -t pr_urls < <(
            sed -n 's/.*pr_url=\([^ ]*\).*/\1/p' "$output_path" | sort -u
          )
          if [ "${#pr_urls[@]}" -eq 0 ]; then
            echo "No generated review PR was reported; there are no checks to approve."
            exit 0
          fi

          approval_failed=0
          for attempt in $(seq 1 12); do
            pending=0
            for pr_url in "${pr_urls[@]}"; do
              if ! pr_json="$(gh pr view "$pr_url" --json number,author,headRefName 2>/dev/null)"; then
                echo "Review PR is not visible yet: $pr_url"
                pending=1
                continue
              fi

              author="$(jq -r '.author.login // empty' <<<"$pr_json")"
              if [ "$author" != "app/github-actions" ] && [ "$author" != "github-actions[bot]" ]; then
                echo "Skipping non-worker PR $pr_url (author=$author)."
                continue
              fi

              pr_number="$(jq -r '.number' <<<"$pr_json")"
              branch="$(jq -r '.headRefName' <<<"$pr_json")"
              run_ids="$(
                gh api --paginate \
                  "repos/${GITHUB_REPOSITORY}/actions/runs?event=pull_request&per_page=100" \
                  --jq '.workflow_runs[] | {id, name, head_branch, conclusion, pull_requests}' \
                | jq -r --arg branch "$branch" --argjson pr "$pr_number" '
                select(.head_branch == $branch)
                | select(.name == "Manual Validation" or .name == "Review Preview Package")
                | select(.conclusion == "action_required")
                | select(any(.pull_requests[]?; .number == $pr))
                | .id
              '
              )"

              if [ -z "$run_ids" ]; then
                echo "Waiting for review checks for PR #$pr_number ($branch)."
                pending=1
                continue
              fi

              while IFS= read -r run_id; do
                [ -z "$run_id" ] && continue
                echo "Approving trusted review check run $run_id for PR #$pr_number."
                if ! gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/approve" >/dev/null; then
                  echo "::error::Could not approve trusted review check run $run_id."
                  approval_failed=1
                fi
              done <<<"$run_ids"
            done

            if [ "$pending" -eq 0 ]; then
              if [ "$approval_failed" -ne 0 ]; then
                exit 1
              fi
              echo "Trusted Feishu-generated review checks are approved."
              exit 0
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          if [ "$approval_failed" -ne 0 ]; then
            exit 1
          fi
          echo "No action-required review checks appeared before the approval window expired."

      - name: Write OpenClaw run metadata
        if: always()
        shell: bash
        run: |
          python integrations/openclaw/scripts/write_workflow_run_metadata.py \
            --output .tmp/openclaw/feishu-start-review-run.json \
            --workflow-name "Feishu Start Review" \
            --workflow-file ".github/workflows/feishu-start-review.yml" \
            --queue-record-id "${{ inputs.queue_record_id || '' }}" \
            --trigger-source "${{ inputs.trigger_source || '' }}" \
            --openclaw-dispatch-nonce "${{ inputs.openclaw_dispatch_nonce || '' }}" \
            --failure-summary-path .tmp/openclaw/feishu-start-review-failure-summary.json \
            --artifact-name feishu-start-review-output \
            --artifact-name openclaw-run-metadata

      - name: Upload seeded review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feishu-start-review-output
          path: |
            docs/_review
            .tmp/openclaw/review-start-output.log
            .tmp/review-start/phase2/snapshot_manifest.json
            .tmp/review-start/phase2/row_key_mapping.csv
          if-no-files-found: ignore

      - name: Upload OpenClaw run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-run-metadata
          path: .tmp/openclaw/feishu-start-review-run.json
          if-no-files-found: error
