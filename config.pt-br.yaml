extends: config.us.yaml

build:
  family_id: pt-br
  default_model: JE-1500D
  default_region: pt-BR
  targets:
    - model: JE-1500D
      region: pt-BR
  languages: [en, pt-BR]
  include_lang_in_output_path: false
  output_pdf: manual_{model_slug}_{region_slug}_{lang_slug}.pdf
  word_output: manual_{model_slug}_{region_slug}_{lang_slug}.docx
  word_title: "|PRODUCT_NAME| User Manual / Manual do usuário"
  rst_substitutions:
    MANUAL_LANGUAGE_SCOPE: English / Portuguese (Brazil)

paths:
  page_manifest: docs/manifests/manual_pt-br.yaml
