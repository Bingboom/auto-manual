extends: config-bases/us-single-language-base.yaml

build:
  family_id: pt-br
  default_model: JE-1500D
  default_region: pt-BR
  targets:
    - model: JE-1500D
      region: pt-BR
  languages: [pt-BR]
  include_lang_in_output_path: true
  word_reference_doc: docs/templates/word_template/template.docx
  word_title_copy_key: word_title
  rst_substitution_copy_keys:
    MANUAL_LANGUAGE_SCOPE: manual_language_scope_pt_br
    LEGAL_COMPANY_NAME: legal_company_name_pt_br

paths:
  page_manifest: docs/manifests/manual_pt-br.yaml
