version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    install:
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.lock
    build:
      html:
        # RTD builds from a bare clone: no Feishu credentials and no local
        # data/phase2 snapshot, so `--source runtime` cannot resolve
        # Spec_Master identity here. Render the committed review bundle
        # as-is instead, with the tracked fixture snapshot supplying the
        # frozen attachments and capability plan.
        # Catalog scope = targets whose review bundle is committed on main
        # (currently JE-1000F/US). Add a target back only after its
        # docs/_review/<model>/<region> bundle lands on main.
        - python build.py md --config configs/config.us.yaml --model JE-1000F --region US --source review-asis --data-root tests/fixtures/phase2 --no-clean --skip-root-index
        # Same-source print web edition: rasterize the committed layout-contract
        # PDF (reports/releases/<model>/<region>/web_edition/*.pdf, built at
        # publish time where XeLaTeX exists) into a print-layout page-card web
        # document. Best-effort — if no committed PDF is found it logs and skips,
        # leaving the HTML-only catalog entry, so the build stays green.
        - python tools/render_web_edition.py --model JE-1000F --region US --out docs/_build/JE-1000F/US/webedition
        - python tools/readthedocs_source.py --build-root docs/_build --output-dir docs/_build/rtd --title "Auto Manual Library"
        - python -m sphinx -b html docs/_build/rtd "$READTHEDOCS_OUTPUT/html"
