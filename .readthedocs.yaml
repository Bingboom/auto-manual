version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt
    build:
      html:
        - python build.py md --config config.us-en.yaml --model JE-1000F --region US --source runtime --no-clean --skip-root-index
        - python -m sphinx -b html docs/_build/JE-1000F/US/en/md "$READTHEDOCS_OUTPUT/html"
