# Shared phase2 (Feishu/Lark) sync block.
# Extended by the merged-family + JP configs that pull data from the same
# Bitable. Override individual keys downstream if a market diverges.
sync:
  phase2:
    provider: lark_cli
    cli_bin: lark-cli
    export_root: data/phase2
    manifest_path: data/phase2/snapshot_manifest.json
    base_token_env: FEISHU_PHASE2_BASE_TOKEN
    spec_master_sources:
      spec_rows_source_table_id_env: FEISHU_PHASE2_SPEC_ROWS_SOURCE_TABLE_ID
      spec_rows_source_view_id_env: FEISHU_PHASE2_SPEC_ROWS_SOURCE_VIEW_ID
      page_placeholders_source_table_id_env: FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_TABLE_ID
      page_placeholders_source_view_id_env: FEISHU_PHASE2_PAGE_PLACEHOLDERS_SOURCE_VIEW_ID
    tables:
      spec_master: {}
      spec_footnotes:
        table_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID
      spec_notes:
        table_id_env: FEISHU_PHASE2_SPEC_NOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_NOTES_VIEW_ID
      symbols_blocks:
        table_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID
        view_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID
      lcd_icons:
        table_id_env: FEISHU_PHASE2_LCD_ICONS_TABLE_ID
        view_id_env: FEISHU_PHASE2_LCD_ICONS_VIEW_ID
      troubleshooting:
        table_id_env: FEISHU_PHASE2_TROUBLESHOOTING_TABLE_ID
        view_id_env: FEISHU_PHASE2_TROUBLESHOOTING_VIEW_ID
      variable_defaults:
        table_id_env: FEISHU_PHASE2_VARIABLE_DEFAULTS_TABLE_ID
        view_id_env: FEISHU_PHASE2_VARIABLE_DEFAULTS_VIEW_ID
      variable_lang_overrides:
        table_id_env: FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_TABLE_ID
        view_id_env: FEISHU_PHASE2_VARIABLE_LANG_OVERRIDES_VIEW_ID
      manual_copy_source:
        table_id_env: FEISHU_PHASE2_MANUAL_COPY_SOURCE_TABLE_ID
        view_id_env: FEISHU_PHASE2_MANUAL_COPY_SOURCE_VIEW_ID
      translation_memory:
        base_token_env: FEISHU_TRANSLATION_MEMORY_BASE_TOKEN
        table_id_env: FEISHU_TRANSLATION_MEMORY_TABLE_ID
        view_id_env: FEISHU_TRANSLATION_MEMORY_VIEW_ID
    model_capabilities:
      table_id_env: FEISHU_PHASE2_MODEL_CAPABILITIES_TABLE_ID
    document_link:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID
      wiki_parent_token_env: FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN
    review_init:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID
