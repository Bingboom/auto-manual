doc_type: manual_bundle

build:
  family_id: eu-merged
  languages: [ en, fr, es, de, it, uk ]
  include_lang_in_output_path: false
  queue_by_document_key: true
  default_model: JE-1000F
  default_region: EU
  targets:
    - model: JE-1000F
      region: EU
  main_tex: manual_demo.tex
  output_pdf: manual_{model_slug}_{region_slug}.pdf
  xelatex_runs: 3
  open_pdf: true
  build_word: true
  word_output: manual_{model_slug}_{region_slug}.docx
  word_source: bundle
  word_reference_doc: docs/templates/word_template/reference_en.docx
  word_title_copy_key: word_title
  rst_substitution_copy_keys:
    MANUAL_LANGUAGE_SCOPE: manual_language_scope_eu
    WARRANTY_EMAIL: warranty_email_eu
    LEGAL_COMPANY_NAME: legal_company_name_eu
  open_word: false
  build_html: false
  open_html: false

paths:
  docs_dir: docs
  structured_data_dir: data/phase2
  layout_params_csv: data/layout_params.csv
  page_registry_csv: data/phase2/page_registry.csv
  page_blocks_dir: data/phase2
  spec_master_csv: data/phase2/Spec_Master.csv
  spec_footnotes_csv: data/phase2/Spec_Footnotes.csv
  spec_notes_csv: data/phase2/Spec_Notes.csv
  spec_titles_csv: data/phase2/spec_titles.csv
  page_manifest: docs/manifests/manual_eu.yaml

sync:
  phase2:
    provider: lark_cli
    cli_bin: lark-cli
    export_root: data/phase2
    manifest_path: data/phase2/snapshot_manifest.json
    base_token_env: FEISHU_PHASE2_BASE_TOKEN
    spec_master_sources:
      spec_rows_source_table_id: tblTw54UzV4ry5VD
      page_placeholders_source_table_id: tblhckTT7PfVBsuG
    tables:
      spec_master: {}
      spec_footnotes:
        table_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID
      spec_notes:
        table_id_env: FEISHU_PHASE2_SPEC_NOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_NOTES_VIEW_ID
      spec_titles:
        table_id_env: FEISHU_PHASE2_SPEC_TITLES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_TITLES_VIEW_ID
      page_copy:
        table_id: tbly6InLMOeTgloV
        view_id: vewMA88Pbw
      symbols_page_copy:
        table_id: tbl9bxNptt0YLO0q
        view_id: vewtSjIvzO
      symbols_blocks:
        table_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID
        view_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID
      lcd_icons:
        table_id: tblDII3oyqFhQYHn
        view_id: vewerElnZ3
      troubleshooting:
        table_id: tblUSuk3Q5BKTdTh
        view_id: vewZne4CUk
      variable_defaults:
        table_id: tblRyRdqRg2MGVgH
        view_id: vew5jbxqLj
      variable_lang_overrides:
        table_id: tblkcXujDMGXnHMo
        view_id: vewODokxUs
    document_link:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID
      wiki_parent_token_env: FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN
    review_init:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID

tools:
  patch_fonts: tools/patch_latex_fonts.py

checks:
  allowed_foreign_identity_literals:
    - 占位符
