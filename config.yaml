doc_type: manual_bundle

build:
  languages: [ en ]
  default_model: JE-1000F
  default_region: US
  targets:
    - model: JE-1000F
      region: US
  # Add more targets here. `python build.py rst|word|html|pdf|all` will iterate this list.
  # Example:
  #   - model: JE-1000F
  #     region: US
  main_tex: manual_demo.tex
  output_pdf: manual_{model_slug}_{region_slug}.pdf
  xelatex_runs: 3
  open_pdf: true
  build_word: true
  word_output: manual_{model_slug}_{region_slug}.docx
  word_source: bundle
  word_reference_doc: docs/templates/word_template/reference_en.docx
  word_title: "|PRODUCT_NAME| User Manual"
  open_word: false
  build_html: false
  open_html: false

paths:
  docs_dir: docs
  structured_data_dir: data/phase1
  layout_params_csv: data/layout_params.csv
  page_registry_csv: data/phase1/page_registry.csv
  page_blocks_dir: data/phase1
  spec_master_csv: data/phase1/Spec_Master.csv
  spec_footnotes_csv: data/phase1/Spec_Footnotes.csv
  spec_notes_csv: data/phase1/Spec_Notes.csv
  spec_titles_csv: data/phase1/spec_titles.csv
  page_manifest: docs/manifests/manual_us-en.yaml

sync:
  phase2:
    provider: lark_cli
    cli_bin: lark-cli
    export_root: data/phase2
    manifest_path: data/phase2/snapshot_manifest.json
    base_token_env: FEISHU_PHASE2_BASE_TOKEN
    tables:
      spec_master:
        table_id_env: FEISHU_PHASE2_SPEC_MASTER_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_MASTER_VIEW_ID
      spec_footnotes:
        table_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_FOOTNOTES_VIEW_ID
      spec_notes:
        table_id_env: FEISHU_PHASE2_SPEC_NOTES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_NOTES_VIEW_ID
      spec_titles:
        table_id_env: FEISHU_PHASE2_SPEC_TITLES_TABLE_ID
        view_id_env: FEISHU_PHASE2_SPEC_TITLES_VIEW_ID
      symbols_blocks:
        table_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_TABLE_ID
        view_id_env: FEISHU_PHASE2_SYMBOLS_BLOCKS_VIEW_ID
    document_link:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID
      wiki_parent_token_env: FEISHU_PHASE2_DOCUMENT_LINK_WIKI_PARENT_TOKEN
    review_init:
      table_id_env: FEISHU_PHASE2_DOCUMENT_LINK_TABLE_ID
      view_id_env: FEISHU_PHASE2_DOCUMENT_LINK_VIEW_ID

tools:
  patch_fonts: tools/patch_latex_fonts.py
