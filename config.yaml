doc_type: manual_bundle

build:
  languages: [ en, fr, es ]
  main_tex: manual_demo.tex
  output_pdf: manual_demo.pdf
  xelatex_runs: 3
  open_pdf: true

paths:
  docs_dir: docs

tools:
  csv_to_rst: tools/csv_to_rst.py
  patch_fonts: tools/patch_latex_fonts.py

pages:
# 1) Cover (EN only, no repeat)
- type: cover_pdf
  file: cover-en.pdf

# 2) Safety pages (generated RST per language)
- type: safety_rst
  langs: [ en, fr, es ]

# 3) Product overview pages (design PDFs per language)
- type: overview_pdf
  file_map:
    en: product_overview-en.pdf
    fr: product_overview-fr.pdf
    es: product_overview-es.pdf
