# config.yaml  (Step-1: control plane only)
build:
  # languages rendered into a single bundled PDF (order matters)
  languages: [ en, fr, es ]

  # LaTeX main file name generated by Sphinx (keep in sync with docs/conf.py)
  main_tex: manual_demo.tex

  # PDF name produced by xelatex in docs/_build/latex/
  output_pdf: manual_demo.pdf

  # How many xelatex passes to run (3 is safe for refs/page labels)
  xelatex_runs: 3

  # Open the final PDF after build (true/false)
  open_pdf: true

paths:
  # docs/ directory that contains conf.py and index.rst
  docs_dir: docs

tools:
  # Script that generates docs/safety_<lang>.rst files
  csv_to_rst: tools/csv_to_rst.py

  # Script that copies+injects fonts.tex into the main .tex before \begin{document}
  patch_fonts: tools/patch_latex_fonts.py
