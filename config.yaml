doc_type: manual_bundle

build:
  languages: [en, fr]
  default_sku: JB1000
  main_tex: manual_demo.tex
  output_pdf: manual_demo.pdf
  xelatex_runs: 3
  open_pdf: true
  build_html: false
  open_html: false

paths:
  docs_dir: docs
  layout_params_csv: data/layout_params.csv

tools:
  patch_fonts: tools/patch_latex_fonts.py

pages:
- type: cover_pdf
  file: cover-en.pdf

- type: csv_page
  source: phase1
  page: safety
  langs: [en, fr]
  include_dir: generated/{sku}

- type: csv_page
  source: phase1
  page: symbols
  langs: [en, fr]
  include_dir: generated/{sku}

- type: csv_page
  source: phase1
  page: spec
  langs: [en, fr]
  include_dir: generated/{sku}

- type: pdf_insert
  langs: [en, fr]
  file_map:
    en: product_overview-en.pdf
    fr: product_overview-fr.pdf
