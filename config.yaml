doc_type: manual_bundle

build:
  languages: [ en ]
  default_model: JHP-2000A
  default_region: US
  main_tex: manual_demo.tex
  output_pdf: manual_demo.pdf
  xelatex_runs: 3
  open_pdf: true
  build_word: true
  word_output: manual_demo_en.docx
  word_source: bundle
  word_reference_doc: /Users/pika/Downloads/EN-HomePower*HP2000 Plus.docx
  word_title: EN-HomePower 2000 Plus User Manual V0.5
  open_word: false
  build_html: false
  open_html: false

paths:
  docs_dir: docs
  layout_params_csv: data/layout_params.csv
  spec_master_csv: data/phase1/Spec_Master.csv
  spec_footnotes_csv: data/phase1/Spec_Footnotes.csv

tools:
  patch_fonts: tools/patch_latex_fonts.py

pages:
- type: cover_pdf
  file: cover-en.pdf

- type: csv_page
  source: phase1
  page: safety
  langs: [ en ]
  include_dir: generated/{model}

- type: rst_include
  lang: en
  file: templates/01_meaning_of_symbols.rst

- type: rst_include
  lang: en
  file: templates/02_whats_in_the_box.rst

- type: rst_include
  lang: en
  file: templates/03_product_overview_placeholder.rst

- type: rst_include
  lang: en
  file: templates/04_lcd_display_placeholder.rst

- type: rst_include
  lang: en
  file: templates/05_operation_guide_placeholder.rst

- type: rst_include
  lang: en
  file: templates/06_ups_mode.rst

- type: rst_include
  lang: en
  file: templates/07_expansion_battery_pack.rst

- type: rst_include
  lang: en
  file: templates/08_charging_methods.rst

- type: rst_include
  lang: en
  file: templates/09_storage_and_maintenance.rst

- type: rst_include
  lang: en
  file: templates/10_troubleshooting.rst

- type: csv_page
  source: phase1
  page: spec
  langs: [ en ]
  include_dir: generated/{model}

- type: rst_include
  lang: en
  file: templates/11_warranty.rst

- type: rst_include
  lang: en
  file: templates/12_app_setup_placeholder.rst
